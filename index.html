<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#050505" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SGT 8º BAEP - Gestão de Performance</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== TOPBAR ===================== -->
  <div class="topbar">
    <h1>SGT - 8º BAEP</h1>
    <small style="color: var(--text-dim)">Híbrido Responsivo v5.0</small>
  </div>

  <div class="container">

    <!-- ============== FORMULÁRIO NOVA MISSÃO ============== -->
    <div class="card">
      <h3 style="margin-top:0; color:var(--primary); font-family:'Cinzel', serif;">Nova Missão</h3>
      <div class="grid-form">

        <div>
          <label>Categoria</label>
          <select id="task-category" onchange="toggleFields()">
            <option value="PROFISSIONAL">Profissional / BAEP</option>
            <option value="PESSOAL">Pessoal / Outros</option>
          </select>
        </div>

        <div>
          <label>Seção Adm</label>
          <select id="task-secao">
            <option value="NENHUMA">NENHUMA</option>
            <option value="P1">P1</option>
            <option value="P2">P2</option>
            <option value="P3">P3</option>
            <option value="P4">P4</option>
            <option value="P5">P5</option>
            <option value="SJD">SJD</option>
          </select>
        </div>

        <div>
          <label>Atribuída por Sup?</label>
          <select id="task-tem-superior" onchange="toggleFields()">
            <option value="NAO">Não</option>
            <option value="SIM">Sim</option>
          </select>
        </div>

        <div>
          <label id="label-exige-feedback">Exige Retorno/Feedback?</label>
          <select id="task-exige-feedback" disabled>
            <option value="NAO">Não</option>
            <option value="SIM">Sim, após conclusão</option>
          </select>
        </div>

        <div style="grid-column: 1 / -1;">
          <label>Missão / Descrição</label>
          <input type="text" id="task-desc" placeholder="Descreva a missão...">
        </div>

        <div>
          <label>Executor (Responsável)</label>
          <input type="text" id="task-executor">
        </div>

        <div>
          <label id="label-superior">Nome do Superior</label>
          <input type="text" id="task-superior" disabled placeholder="N/A">
        </div>

        <div>
          <label>Início</label>
          <input type="date" id="task-created-at">
        </div>

        <div>
          <label>Prazo Final</label>
          <input type="date" id="task-deadline">
        </div>

      </div>
      <button class="btn btn-gold" onclick="addTask()">Cadastrar Missão</button>
    </div>

    <!-- ============== TABELA DE MISSÕES ============== -->
    <div class="card">
      <div class="toolbar-actions">

        <div class="filter-group">
          <button class="btn btn-filter active" id="f-all"    onclick="setFilter('ALL')">TODAS</button>
          <button class="btn btn-filter"         id="f-prof"   onclick="setFilter('PROFISSIONAL')">PROFISSIONAL</button>
          <button class="btn btn-filter"         id="f-pessoal" onclick="setFilter('PESSOAL')">PESSOAL</button>
        </div>

        <select id="filter-secao" class="select-filter" onchange="setSecaoFilter(this.value)">
          <option value="ALL">TODAS AS SEÇÕES</option>
          <option value="P1">P1</option>
          <option value="P2">P2</option>
          <option value="P3">P3</option>
          <option value="P4">P4</option>
          <option value="P5">P5</option>
          <option value="SJD">SJD</option>
          <option value="NENHUMA">NENHUMA</option>
        </select>

        <button class="btn-green" onclick="shareSelected()">
          📱 COMPARTILHAR SELECIONADAS (WA)
        </button>

      </div>

      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th style="width:30px; text-align:center;">
                <input type="checkbox" id="check-all" onclick="toggleAllChecks()">
              </th>
              <th style="width:120px;">Status</th>
              <th style="width:25%;">Missão / Categoria</th>
              <th style="width:18%;">Responsáveis / Retorno</th>
              <th style="width:120px;">Datas</th>
              <th style="width:20%;">Anotações da Missão</th>
              <th style="width:140px; text-align:center;">Ações</th>
            </tr>
          </thead>
          <tbody id="task-list"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /container -->

  <!-- ============== MODAL DETALHES ============== -->
  <div id="modal-detalhes" class="modal-overlay">
    <div class="modal-content">
      <h2>Detalhes Estratégicos</h2>
      <div id="modal-body" class="modal-body"></div>
      <div style="text-align:right;">
        <button class="btn btn-gold" style="width:auto; padding:10px 20px;" onclick="closeModal()">
          FECHAR
        </button>
      </div>
    </div>
  </div>

  <!-- ============== SCRIPTS ============== -->
  <!-- type="module" habilita ES Modules (import/export) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
